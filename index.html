<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kellis Sales</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    /* ── Item search modal ───────────────────────────────────────── */
    .search-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 10000;
      align-items: flex-start;
      justify-content: center;
      padding-top: 80px;
    }
    .search-modal-overlay.open { display: flex; }
    .search-modal {
      background: #1e293b;
      border: 1px solid #2d3f55;
      border-radius: 8px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      width: 480px;
      max-width: 92vw;
      overflow: hidden;
    }
    .search-modal-header {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 10px 10px;
    }
    .search-modal-input {
      flex: 1;
      background: #263347;
      border: 1px solid #334155;
      border-right: none;
      border-radius: 6px 0 0 6px;
      color: #e2e8f0;
      font-size: 14px;
      height: 38px;
      padding: 0 12px;
      outline: none;
    }
    .search-modal-input::placeholder { color: #64748b; }
    .search-modal-go {
      background: #3b82f6;
      border: 1px solid #3b82f6;
      border-radius: 0 6px 6px 0;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      height: 38px;
      width: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .search-modal-go:hover { background: #2563eb; }
    .search-modal-results {
      max-height: 360px;
      overflow-y: auto;
      border-top: 1px solid #263347;
    }
    .search-modal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid #1a2636;
      transition: background 0.1s;
    }
    .search-modal-row:last-child { border-bottom: none; }
    .search-modal-row:hover { background: #263347; }
    .search-modal-num {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #93c5fd;
      white-space: nowrap;
      min-width: 72px;
    }
    .search-modal-name {
      flex: 1;
      font-size: 13px;
      color: #cbd5e1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-modal-badge {
      font-size: 10px;
      color: #64748b;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .search-modal-hint {
      padding: 16px;
      font-size: 13px;
      color: #64748b;
      text-align: center;
    }
    /* ── Trend view toggle ──────────────────────────────────────── */
    .trend-toggle {
      display: flex;
      gap: 0;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
    }
    .trend-btn {
      background: #fff;
      border: none;
      color: #6b7280;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 3px 10px;
      transition: background 0.15s, color 0.15s;
    }
    .trend-btn + .trend-btn { border-left: 1px solid #e2e8f0; }
    .trend-btn.active { background: #0d9488; color: #fff; }
    .trend-btn:not(.active):hover { background: #f1f5f9; color: #374151; }
    /* ── Nav search dropdown rows ──────────────────────────────── */
    .nav-srch-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; cursor: pointer; border-bottom: 1px solid #1e2d3d;
      transition: background 0.1s;
    }
    .nav-srch-row:last-child { border-bottom: none; }
    .nav-srch-row:hover { background: #263347; }
    .nav-srch-num  { font-family: monospace; font-size: 12px; font-weight: 700; color: #93c5fd; white-space: nowrap; min-width: 72px; }
    .nav-srch-name { flex: 1; font-size: 13px; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-srch-state { font-size: 11px; color: #64748b; background: #0f172a; border: 1px solid #334155; border-radius: 4px; padding: 2px 6px; }
    /* ── Nav search wrap ────────────────────────────────────────── */
    .nav-search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .nav-search-icon {
      position: absolute;
      left: 9px;
      width: 15px;
      height: 15px;
      color: #94a3b8;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s;
      pointer-events: all;
    }
    .nav-search-icon:hover { color: #e2e8f0; }
    .nav-search-wrap .nav-search-input { padding-left: 30px; }
  </style>
</head>
<body>

<!-- ── Nav Bar ─────────────────────────────────────────────── -->
<nav class="nav-bar">
  <div class="nav-left">
    <div class="nav-icon">KS</div>
    <span class="nav-title">Kellis Sales</span>
  </div>
  <div class="nav-center">
    <button class="btn btn-ghost btn-sm" onclick="switchTab('store')">Home</button>
  </div>
  <div class="nav-right">
    <span class="nav-stat" id="toolbar-status">Loading...</span>
    <button class="btn btn-ghost btn-sm" onclick="loadData()">&#8635; Refresh</button>

</nav>


<!-- ── Tab Bar ─────────────────────────────────────────────── -->
<div class="tab-bar">

  <button class="tab-btn"        id="tab-btn-item"     onclick="switchTab('item')">Customer Account</button>

      </svg>
      <input id="ca-search-input" type="text" placeholder="Search customers…" autocomplete="off"

      />

    </div>
  </div>

  <button class="tab-btn"        id="tab-btn-category" onclick="switchTab('category')">Item Performance</button>
  <!-- Item search — visible only when Item Performance tab is active -->
  <div id="tab-ip-search" style="display:none;align-items:center;padding:6px 0 6px 4px;position:relative">
    <div style="position:relative">
      <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.5);pointer-events:none" width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
      </svg>
      <input id="ip-search-input" type="text" placeholder="Search items…" autocomplete="off"
        style="padding:6px 12px 6px 30px;border:1.5px solid rgba(255,255,255,0.25);border-radius:6px;background:rgba(255,255,255,0.12);color:#fff;font-size:13px;font-family:inherit;outline:none;width:240px;transition:border-color 0.15s,background 0.15s"
        onfocus="this.style.borderColor='rgba(255,255,255,0.6)';this.style.background='rgba(255,255,255,0.18)'"
        onblur="this.style.borderColor='rgba(255,255,255,0.25)';this.style.background='rgba(255,255,255,0.12)'"
      />
      <div id="ip-search-dropdown"
        style="display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:320px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:9999;max-height:320px;overflow-y:auto">
      </div>
    </div>
  </div>

  <button class="tab-btn"        id="tab-btn-leaderboard" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
</div>

  <div class="load-bar-outer"><div class="load-bar-inner"></div></div>

<script>
  // ── Customer Account inline search ────────────────────────────
  let _caSearchTimer = null;
  let _caSearchResults = [];
  let _caSearchActive = -1;

  function caSearchDismiss(e) {
    const bar = document.getElementById('tab-ca-search');
    if (bar && !bar.contains(e.target)) {
      const dd = document.getElementById('ca-search-dropdown');
      if (dd) dd.style.display = 'none';
    }
  }

  function caSearchSelect(idx) {
    const r = _caSearchResults[idx];
    if (!r) return;
    const inp = document.getElementById('ca-search-input');
    if (inp) inp.value = r.name + ' (' + r.custNo + ')';
    const dd = document.getElementById('ca-search-dropdown');
    if (dd) dd.style.display = 'none';
    if (typeof loadCustomerAccount === 'function') loadCustomerAccount(r.custNo);
  }

  document.addEventListener('DOMContentLoaded', function() {
    const inp = document.getElementById('ca-search-input');
    if (!inp) return;

    inp.addEventListener('input', function() {
      clearTimeout(_caSearchTimer);
      const q = this.value.trim();
      const dd = document.getElementById('ca-search-dropdown');
      if (q.length < 2) { if (dd) dd.style.display = 'none'; return; }
      _caSearchTimer = setTimeout(async () => {
        try {
          const resp = await fetch('/proxy/customers/search?q=' + encodeURIComponent(q));
          const rows = resp.ok ? await resp.json() : [];
          _caSearchResults = rows;
          _caSearchActive  = -1;
          if (!dd) return;
          if (!rows.length) {
            dd.innerHTML = '<div style="padding:12px 14px;color:#9ca3af;font-size:13px">No customers found.</div>';
          } else {
            dd.innerHTML = rows.map((r, i) =>
              '<div style="padding:9px 14px;cursor:pointer;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:10px" ' +
              'onclick="caSearchSelect(' + i + ')" ' +
              'onmouseenter="this.style.background=\'#f0f4f8\'" onmouseleave="this.style.background=\'\'">' +
              '<span style="font-family:monospace;font-size:11px;font-weight:700;color:#3d5a80;min-width:72px">' + r.custNo + '</span>' +
              '<span style="font-size:13px;color:#1a2332;flex:1">' + r.name + '</span>' +
              (r.state ? '<span style="font-size:11px;color:#9ca3af">' + r.state + '</span>' : '') +
              '</div>'
            ).join('');
          }
          dd.style.display = 'block';
        } catch (_) {}
      }, 280);
    });

    inp.addEventListener('keydown', function(e) {
      const dd   = document.getElementById('ca-search-dropdown');
      const rows = dd ? dd.querySelectorAll('div[onclick]') : [];
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _caSearchActive = Math.min(_caSearchActive + 1, rows.length - 1);
        rows.forEach((r, i) => r.style.background = i === _caSearchActive ? '#f0f4f8' : '');
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _caSearchActive = Math.max(_caSearchActive - 1, 0);
        rows.forEach((r, i) => r.style.background = i === _caSearchActive ? '#f0f4f8' : '');
      } else if (e.key === 'Enter') {
        if (_caSearchActive >= 0) caSearchSelect(_caSearchActive);
        else if (_caSearchResults.length) caSearchSelect(0);
      } else if (e.key === 'Escape') {
        if (dd) dd.style.display = 'none';
      }
    });

    document.addEventListener('click', caSearchDismiss);
  });
</script>
