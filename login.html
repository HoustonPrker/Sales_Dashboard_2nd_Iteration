<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kellis Sales — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2332 0%, #2d3f55 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.2);
      width: 420px;
      max-width: 100%;
      padding: 40px 36px 36px;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #0d9488;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a2332;
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-top: -4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: #1a2332;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 2px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .toggle-pw:hover { color: #374151; }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .error-msg.visible { display: block; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #0d9488;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.2px;
    }

    .btn-login:hover:not(:disabled) { background: #0f766e; }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .btn-login .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-circle">KS</div>
      <div class="logo-title">Kellis Sales</div>
      <div class="logo-subtitle">Sales Intelligence Platform</div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               placeholder="Enter your username" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password"
                 placeholder="Enter your password" required>
          <button type="button" class="toggle-pw" id="toggle-pw-btn" onclick="togglePassword()" title="Show/hide password" aria-label="Toggle password visibility">
            <!-- Eye icon -->
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <!-- Eye-off icon (hidden by default) -->
            <svg id="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    (function() {
      const token = localStorage.getItem('ks_auth_token');
      if (token) {
        fetch('/proxy/auth/me', { headers: { Authorization: 'Bearer ' + token } })
          .then(function(r) { if (r.ok) window.location.href = '/'; })
          .catch(function() {});
      }
    })();

    function togglePassword() {
      const inp = document.getElementById('password');
      const eyeOn  = document.getElementById('eye-icon');
      const eyeOff = document.getElementById('eye-off-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        eyeOn.style.display  = 'none';
        eyeOff.style.display = '';
      } else {
        inp.type = 'password';
        eyeOn.style.display  = '';
        eyeOff.style.display = 'none';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    function setLoading(loading) {
      const btn = document.getElementById('login-btn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';
      } else {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showError('Please enter your username and password.'); return; }

      setLoading(true);
      try {
        const res = await fetch('/proxy/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed. Please try again.');
          setLoading(false);
          return;
        }

        localStorage.setItem('ks_auth_token', data.token);
        localStorage.setItem('ks_auth_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        showError('Could not reach the server. Please check your connection.');
        setLoading(false);
      }
    }
  </script>
</body>
</html>
